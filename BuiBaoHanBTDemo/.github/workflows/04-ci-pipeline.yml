name: "BT4 - CI Pipeline Tổng Hợp"

# Chạy khi push lên main HOẶC tạo Pull Request vào main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ===== JOB 1: Build & Test bằng Maven =====
  maven-build:
    name: "Job 1 - Maven Build & Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Cài Java 25"
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: "Cache Maven"
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: "Build & Test"
        run: mvn package

      # Lưu file .jar lại để Job 2 dùng (không cần build lại)
      - name: "Lưu file .jar"
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/*.jar

  # ===== JOB 2: Build Docker image (chỉ chạy sau khi Job 1 thành công) =====
  docker-build:
    name: "Job 2 - Docker Build"
    runs-on: ubuntu-latest
    needs: maven-build   # Phụ thuộc Job 1 — nếu Job 1 lỗi, Job 2 không chạy

    steps:
      - uses: actions/checkout@v4

      - name: "Build Docker image"
        run: |
          docker build -t buibaohanbtdemo:${{ github.sha }} .
          echo "Image built với tag: ${{ github.sha }}"

      - name: "Kiểm tra image"
        run: docker images buibaohanbtdemo

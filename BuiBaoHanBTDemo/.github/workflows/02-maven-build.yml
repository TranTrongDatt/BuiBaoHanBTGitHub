name: "BT2 - Maven Build & Test"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-va-test:
    runs-on: ubuntu-latest

    steps:
      # BƯỚC 1: Tải code về máy ảo (luôn phải có bước này)
      - name: "Bước 1 - Tải code"
        uses: actions/checkout@v4

      # BƯỚC 2: Cài Java 25 lên máy ảo (máy ảo GitHub chưa có sẵn Java 25)
      - name: "Bước 2 - Cài Java 25"
        uses: actions/setup-java@v4
        with:
          java-version: '25'         # Phải khớp với java.version trong pom.xml
          distribution: 'temurin'    # Bản phân phối Java (Eclipse Temurin)

      # BƯỚC 3: Cache thư viện Maven (lần sau build nhanh hơn, không cần tải lại)
      - name: "Bước 3 - Cache thư viện Maven"
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}  # Key thay đổi khi pom.xml thay đổi

      # BƯỚC 4: Build và chạy test
      - name: "Bước 4 - Build project"
        run: mvn package -DskipTests    # Biên dịch, đóng gói thành file .jar

      - name: "Bước 5 - Chạy Unit Test"
        run: mvn test                   # Chạy toàn bộ test trong src/test/

      # BƯỚC 5: In kích thước file .jar vừa build
      - name: "Bước 6 - Kiểm tra file .jar"
        run: |
          echo "=== File .jar đã tạo ra ==="
          ls -lh target/*.jar

spring.application.name=BuiBaoHanBTDemo

# Server port
server.port=8080

# =============================================
# CẤU HÌNH LOCAL (chạy trực tiếp, không Docker)
# Dùng H2 in-memory để dev nhanh, không cần cài MySQL
# =============================================
spring.datasource.url=jdbc:h2:mem:demodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =============================================
# KHI CHẠY VỚI DOCKER COMPOSE:
# Các biến SPRING_DATASOURCE_* trong docker-compose.yml
# sẽ tự động GHI ĐÈ các giá trị H2 ở trên → dùng MySQL
# =============================================

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Giới thiệu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            margin: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .features {
            text-align: left;
            margin: 30px 0;
        }
        .feature-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .feature-item h4 {
            margin-bottom: 5px;
        }
        .feature-item p {
            opacity: 0.8;
            font-size: 0.95rem;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: white;
            color: #11998e;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Giới thiệu Project</h1>
        
        <div class="features">
            <div class="feature-item">
                <h4>Spring Boot 4.0</h4>
                <p>Framework mạnh mẽ để xây dựng ứng dụng Java nhanh chóng</p>
            </div>
            <div class="feature-item">
                <h4>Thymeleaf</h4>
                <p>Template engine hiện đại cho server-side rendering</p>
            </div>
            <div class="feature-item">
                <h4>JPA + Hibernate</h4>
                <p>ORM để tương tác với database dễ dàng</p>
            </div>
            <div class="feature-item">
                <h4>Docker Ready</h4>
                <p>Dockerfile đã được cấu hình sẵn để deploy</p>
            </div>
        </div>
        
        <a href="/" class="btn">Quay về trang chủ</a>
    </div>
</body>
</html>

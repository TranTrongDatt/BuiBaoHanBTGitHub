spring.application.name=BuiBaoHanBTDemo1
server.port=8080

# =============================================================
# PROFILE MẶC ĐỊNH: dev (dùng H2 database)
# Để chuyển sang MySQL: java -jar app.jar --spring.profiles.active=prod
# =============================================================
spring.profiles.active=dev

# Thymeleaf config
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# Logging
logging.level.org.springframework=INFO
logging.level.com.example=DEBUG
